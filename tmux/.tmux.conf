# Without mouse mode, terminals translate the wheel into Up/Down arrows
# inside tmux (alternate screen), which cycles shell history at a prompt
# instead of scrolling. With it on, the wheel scrolls tmux's scrollback;
# hold Shift for the terminal's native text selection.
set -g mouse on

# Keep tmux selections out of the system clipboard (off = no OSC 52 either):
# a mouse drag copies only into tmux's own buffer (paste inside tmux with
# prefix+]). The system clipboard is driven explicitly instead — Shift+drag
# for the terminal's native selection, then Ctrl+Shift+C / Ctrl+Shift+V —
# so stray selections never clobber what was copied elsewhere.
set -s set-clipboard off
