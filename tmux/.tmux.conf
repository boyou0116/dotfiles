# Without mouse mode, terminals translate the wheel into Up/Down arrows
# inside tmux (alternate screen), which cycles shell history at a prompt
# instead of scrolling. With it on, the wheel scrolls tmux's scrollback;
# hold Shift for the terminal's native text selection.
set -g mouse on

# VTE terminals (Ptyxis, GNOME Terminal) reject OSC 52, tmux's usual route to
# the system clipboard (Ghostty accepts it) — so ALSO pipe mouse-selection
# copies straight to the Wayland clipboard. Needs wl-clipboard (install.sh).
if-shell 'command -v wl-copy' {
    bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'
}
